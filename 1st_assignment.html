<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    1. A block element starts on a new line and takes up the full width available by default.
      It can contain both block and inline elements.
    -->
    <p>First paragraph</p>
    <p>Second paragraph</p>
    <!-- Each paragraphs are on different lines
    
     Inline elements doesn't start on a new line. It takes up as much space as its content needs. It usually contains texts or other inline elements.
    -->
     <p>I am a <strong>boy</strong>.</p>
     <!-- The element, <strong> stays on the same line as the text -->

    <!-- 
    2. The <input> element used to create form fields where users can enter data. The *type* attribute determines what kind of input field is displayed
       Input type include; text, password, email, number, tel, url, search, date, time, datetime, month, week, color, range, radio, checkbox, file, hidden, submit, reset, button, image
    -->
       <input type="text"
       placeholder="Enter your name">

       <input type="password"
       placeholder="Enter your password">

       <input type="number" min="1"
       max="100">
</body>
</html>
