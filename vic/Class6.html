<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
         .container1{
            display: flex;
            flex-direction: row;
            flex-direction: column;
            flex-direction: column-reverse;
            justify-content: flex-end;
            justify-content: flex-start;
            justify-content: space-around;
            justify-content: space-between;
            justify-content: center;



         }
         .continer1 div{
            padding: 30px;
            background: orange;
            margin: 2px;

         }
         .d-block {
            display: block;
            background: blue;
         }
         .d none{
            display: inline;
            display: inline-display;
            display: none;
            background: red;
            width: 500px;

         }
         .intro{
            height: 100vh;
            background-image:url(https://wallpapers.com/images/hd/guitar-pictures-extfg5tqghgvdjgr.jpg);
           background-size:cover;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
         }
         .intro.content{
            background-color: aliceblue;
            padding: 2px;
            margin: 5px;
            border-radius: 7px;
            width: 90%;
            max-width: 450px;
            border: 2px solid white;
            text-align: center;
            font-size: 10px;
            color: white;
            text-shadow: 0 0 2px #00000045;
            font-weight: 900px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         }
         .intro a{
            font-size: 14px;
            background: white;
            padding: 10px 30px;
            text-decoration: none;
            border-radius: 5px;
            text-transform: uppercase;
            transition: .3s;
            display: block;
            width: fit-content;
            margin: auto;
            &:hover{
                box-shadow: 5px 5px 7px 0px #ffffff45;
                transform: translate(0,-3px);
            }

         }
         header{
            display: flex;
            padding: 20px;
            background-image: url(https://wallpapers.com/images/hd/guitar-pictures-extfg5tqghgvdjgr.jpg);
            background-position: top;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
         }
         nav a{
            display: block;
            padding: 4px 8px;
            text-decoration: none;
            border-radius: 6px;
            &:hover{
                background: #ffffff69;
                font-weight: bold;
            }
         }
         nav .btn{
            background: #fff;
            padding: 6px 20px;
            box-shadow: 0 0 4px 1px #00000077;
         }
         </style>
</head>
<body>
    <header>
        <h1>Matrix<span>BOOTCAMPS</span></h1>
        <Nav>
            <a href="">Bootcamps</A>
            <a href="">Forums</A>
            <a href="" class="btn">join</A>
        </Nav>
    </header>
    <div class="intro">
        <div class="content">
            <h2>2026 web bootcamp</h2>
            <a href="">join now</a>
        </div>
    </div>
    <!-- display -->
     <section class="container1">
        <div>Lorem, ipsum.</div>
        <div>Lorem, ipsum.</div>
        <div>Lorem, ipsum dolor.</div>
    </section>
        <span class="d-block">Lorem.</span>
        <span class="d-block">Lorem, ipsum.</span>

        <div class="d-none">Lorem, ipsum dolor sit.</div>

</body>
</html>
