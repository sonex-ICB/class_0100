<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        body{
            background-color: rgba(245, 245, 245, 0.548);
            font-family: cursive;
            padding: 20px;
        }
        h1{
            text-align: center;
        }

        table{
            width: 60px;
            margin: auto;
            background-color: antiquewhite;
            box-shadow: 0 4px 8px;
         }
         th, td{
            border: 2px solid;
            padding: 12px;
            text-align: center;
         }
         th{
            background-color: lightblue;
         }
         tr{
            background-color: azure;
         }
    </style>
</head>
<body>

</html>
