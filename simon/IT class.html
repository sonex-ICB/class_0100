<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    padding: 20px;
  }

  .login-container {
    background: #ffffff;
    width: 100%;
    max-width: 380px;
    border-radius: 12px;
    padding: 40px 32px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  .login-container h1 {
    text-align: center;
    color: #333;
    font-size: 26px;
    margin-bottom: 6px;
  }

  .login-container p.subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 28px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 18px;
  }

  .input-group label {
    font-size: 13px;
    color: #444;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .input-group input {
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .input-group input:focus {
    border-color: #6a11cb;
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.15);
  }

  .input-group input:invalid:not(:placeholder-shown) {
    border-color: #e74c3c;
  }

  .error-message {
    font-size: 12px;
    color: #e74c3c;
    margin-top: 5px;
    display: none;
  }

  .input-group input:invalid:not(:placeholder-shown) + .error-message {
    display: block;
  }

  .options-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    font-size: 13px;
  }

  .options-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #555;
    cursor: pointer;
  }

  .options-row a {
    color: #6a11cb;
    text-decoration: none;
  }

  .options-row a:hover {
    text-decoration: underline;
  }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s ease, transform 0.1s ease;
  }

  .login-btn:hover {
    opacity: 0.9;
  }

  .login-btn:active {
    transform: scale(0.98);
  }

  .signup-text {
    text-align: center;
    font-size: 13px;
    color: #777;
    margin-top: 22px;
  }

  .signup-text a {
    color: #6a11cb;
    font-weight: 600;
    text-decoration: none;
  }

  .signup-text a:hover {
    text-decoration: underline;
  }

  @media (max-width: 420px) {
    .login-container {
      padding: 30px 22px;
    }
  }
</style>
</head>
<body>

  <div class="login-container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to continue to your account</p>

    <form action="#" method="POST" novalidate>
      <div class="input-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Simoen@gmail.com"
          required
        >
        <span class="error-message">Please enter a valid email address.</span>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          minlength="6"
          required
        >
        <span class="error-message">Password must be at least 6 characters.</span>
      </div>

      <div class="options-row">
        <label>
          <input type="checkbox" name="remember">
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Log In</button>
    </form>

    <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>
  </div>

</body>
</html>
