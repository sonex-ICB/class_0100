<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Table</title>
<style>
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: Arial, sans-serif;
  }

  th, td {
    border: 1px solid #000000;
    padding: 10px;
    text-align: left;
  }

  th {
    background-color: #090903d3;
    color: #fff;
  }

  tr:nth-child(even) {
    background-color: #f2f2f2;
  }
</style>
</head>
<body>

<table>
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Country</th>
  </tr>
  <tr>
    <td>John</td>
    <td>25</td>
    <td>Nigeria</td>
  </tr>
  <tr>
    <td>Amaka</td>
    <td>30</td>
    <td>Nigeria</td>
  </tr>
  <tr>
    <td>Sam</td>
    <td>28</td>
    <td>Ghana</td>
  </tr>
</table>

</body>
</html>
