<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Card</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f9e400;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 340px;
    background: aliceblue;
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);    
    text-align: center;
  }

  .card img {
    width: 150px;
    padding: 10px;
    margin-bottom: 14px;
    &:hover{
    animation: spin 4s linear infinite;

    }
  }



  @keyframes spin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }



  .details {
    background: #fff;
    border-radius: 10px;
    padding: 18px 20px;
    text-align: left;
    margin-bottom: 22px;
  }

  .details p{
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
  }

 

  .order-btn:hover {
    background: blue;
  }
</style>
</head>
<body>

  <div class="card border-5 border border-white text-dark">
    <img src="Sneakers.jpeg" alt="Sneaker">

    <div class="py-3 text-warning">
        <i class="ri-star-fill"></i>
        <i class="ri-star-fill"></i>
        <i class="ri-star-fill"></i>
        <i class="ri-star-fill"></i>
        <i class="ri-star-fill"></i>
    </div>


    <div class="details text-secondary">
      <p>Best Sneakers</p>
      
      <p class="price">Price: $1,000</p>
      <p>Colors : Red, White, Black</p>
      <p>Pick Up Location: Area 2</p>
    </div>
    <div class="text-center py-3">
      <button class="btn btn-dark rounded-5  px-5 btn-sm fw-bold">ORDER NOW</button>
    </div>

  </div>

</body>
</html>
