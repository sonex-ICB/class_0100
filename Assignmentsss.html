<!DOCTYPE html>
<html lang="end">
    <head>
        <meta charset="UFT-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
     <p>QUESTION 1</p> 
         <!-- Inline Elements : It is an HTML tag that lives inside a line of text.
            It does not break the flow or push other content to a new line -->
            <p>Materials needed in the kitchen</p>
            <span>Pots</span>
            <span>Spoons</span>
            <span>Forks</span>

            <p><strong>Strong</strong></p>


         <!-- Block Elements : It takes up the full width available and always starts on a new line.
            Whatever comes before and after it gets pushed to a new line. -->
         <h1>Hello World</h1>
         <h2>Hello World</h2>
         <h3>Hello World</h3>
         <h4>Hello World</h4>
         <h5>Hello World</h5>
         <h6>Hello World</h6>


         <p>QUESTION 2</p>
         <!--INPUTS : They are elements tat let users type,click and interact with your page-->
         <P>TYPES OF INPUTS: <br>
            <input type="password"> <br>
            <input type="date"> <br>
            <input type="radio">

         </P>
         
</html>
