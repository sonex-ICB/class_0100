<!-- inline elements:elements that do not start on 
            a new line and only occupy as much width as 
            their content requires -->
            <h3>my assignment </h3>
            <!-- block elements:an elements that
              always starts on a new line and takes up the full
              horizontal width avaliable within its parent container-->
              <div style="background-color: beige;"> my assignment </div>
            <!-- input(types):the behaviour
              of an entry field is defined
              using the <input> element combined 
              with the type attribute-->
              <input type="checkbox">my assignment
              <input type="reset" />
              <input type="color" />
              <input type="checkbox" />
              <input type="button" />
