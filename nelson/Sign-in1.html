<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Reset default browser styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background:blue;
    padding: 30px;
}

/* Glassmorphism card design */
.login-container {
    background: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    width: 90%;
    max-width: 430px;
}

h2 {
    color: black;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    text-align: center;
    justify-content: center;
}

.subtitle {
    color: #787575;
    font-size: 14px;
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
    text-align: center;
}

/* Input Fields styling */
.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    font-size: 14px;
    color: #444444;
    margin-bottom: 8px;
    font-weight: 500;
}

.input-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #cccccc;
    border-radius: 8px;
    font-size: 15px;
}


/* Utilities (Checkbox & Link) */
.form-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    margin-bottom: 25px;
}

.remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #555555;
}

.forgot-pass {
    color: #0d36ecca;
    text-decoration: none;
    font-weight: 500;
}

.forgot-pass:hover {
    text-decoration: underline;
    transition: 2s;
}
.login-btn {
    width: 100%;
    padding: 14px;
    background: blue;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    font-weight: 600;
}

.separator {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 25px 0;
    color: #aaaaaa;
    font-size: 13px;
}

.separator::before, .separator::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid #e0e0e0;
}

.separator span {
    padding: 10px;
}
.signup-link {
    text-align: center;
    font-size: 14px;
    color: #555555;
}

.signup-link a {
    color: blue;
    text-decoration: none;
    font-weight: 600;
}

.signup-link a:hover {
    text-decoration: underline;
}

    </style>
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Social Media Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details to sign in</p>

        <form action="#">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="separator">
            <span>or sign in with</span>
        </div>
        <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
    </div>
</body>
</html>

</body>
</html>
