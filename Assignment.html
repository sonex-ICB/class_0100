    <!--
    1a.Inline elements: Don't start on a new line, only take up as much width as their content, can't have width/height set directly (by default).
    Example: -->

    <i></i>  
<span></span>
<a></a>
<strong></strong>
<em></em>
<img />
<label></label>

    2b.Block elements: Start on a new line and take up the full width available.
    Example:
    <div></div>
<p></p>
<h1></h1>
<section></section>
<ul></ul>
<form></form>

    2.input {types}-->> is a self-closing (void) inline element. The type attribute changes its entire behavior.
    Example:
<input type="text">        <!-- single-line text -->
<input type="password">    <!-- masked text -->
<input type="email">       <!-- validates email format -->
<input type="number">      <!-- numeric only, with spinners -->
<input type="checkbox">    <!-- toggle on/off -->
<input type="radio">       <!-- pick one from a group -->
<input type="date">        <!-- date picker -->
<input type="file">        <!-- file upload -->
<input type="submit">      <!-- submits the form -->
<input type="range">       <!-- slider -->
<input type="hidden">      <!-- invisible, sends data without display -->
