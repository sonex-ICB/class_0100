<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        .container1 {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            flex-direction: row-reverse;
            flex-direction: column-reverse;
            justify-content: flex-end;
            justify-content: space-around;
            justify-content: space-between;
            justify-content: center;
        }

        .container1 div {
            padding: 30px;
            background: orange;
            margin: 2px;
        }

        .d-block {
            display: block;
            background: blue;
        }

        .d-none {
            display: inline;
            display: inline-block;
            display: none;
            width: 500px;
            background: red;
        }

        .intro {
            height: 100vh;
            background-image: url('../assets/pic1.jpg');
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;


        }
        .intro .content {
            background: #ffffff45;
            padding:100px  12px;
            border-radius:12px ;
            width: 90%;
            max-width: 450px;
            border:4px solid #fff;
            text-align: center;
            font-size: 32px;
            color:#fff;
            text-shadow: 0 0 2px #00000045;
            font-weight: 900;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: auto;
        }

        .intro a {
            font-size: 14px;
            background: #fff;
            padding: 10px 30px ;
            border-radius: 5px;
            text-decoration:none;
            text-transform: uppercase;
            transition:.2s;
            display: block;
            width: fit-content;
            margin: auto;
            &:hover{
                box-shadow: 5px 5px 7px 0px #ffffff45;
                transform: translate(0, -3px);
                
            }
        }
        /*  header */
        header{
            display: flex;
            padding: 20px;
            background-image:url(../assets/pic1.jpg) ;
            background-position: top;
            align-items: center;
            justify-content: space-between;
        }
        nav a{
            display: block;
            padding: 4px 8px;
            text-decoration: none;
            color:#000;
            border-radius: 6px;
            &:hover{
                background: #ffffff89;
                font-weight: bold;

            }
        }
        nav{
            display: flex;
        }
        nav .btn{
            background: #fff;
            padding: 6px 20px;
            box-shadow: 0 0 4px 1px #00000041;
        }
    </style>
</head>

<body>
    <header>
        <h1> Matrix <span>BOOTCAMPS</span> </h1>
        <nav>
            <a href=""> Bootcamps </a>
            <a href=""> Forums </a>
            <a href="" class="btn"> join </a>
        </nav>
    </header>
    <div class="intro">
        <div class="content">
            <h2> 2026 WEB BOOTCAMP </h2>
            <a href=""> join now</a>
        </div>
    </div>
    <!-- display :  -->
    <section class="container1">
        <div style="background: red;">Lorem.</div>
        <div style="background: pink;">Lorem ipsum </div>
        <div>Lorem ipsum dolor </div>
    </section>

    <span class="d-block"> Lorem, ipsum .</span>
    <span class="d-block"> Lorem, ipsum.</span>

    <div class="d-none"> Lorem ipsum dolor sit.</div>
    <div class="d-none"> Lorem ipsum dolor sit.</div>
</body>

</html>
