<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="">
        <div>
            <label for="">First name</label>
            <input type="text" required name="First name"/>
        </div>

        <div>
            <label for="">Last Name</label>
            <input type="text" required name="Last Name"/>
        </div>

        <div>
            <label for="">Email</label>
            <input type="email" required name="email"/>
        </div>

        <p>
            <label for="">Address</label>
            <input type="text" required name="Address"/>
        </p>

        <p>
            <label for="">DOB</label>
            <input type="date" required name="Date Of Birth">
        </p>

        <p>
            <label for="">Gender</label>
            <input type="radio" required name="gender" value="Male"> Male
            <input type="radio" required name="gender" value="Female"> Female
        </p>

        <p>
            <label for="">Select Course</label>
            <select name="" id="" required name="Select Course">
                <option value="">Course</option>
                <option value="front end">Front End</option>
                <option value="c++">C++</option>
                <option value="fullstack">Fullstack</option>
                <option value="graphic design">Graphic Design</option>
            </select>
        </p>

        <p>
            <label for="">Mobile Number</label>
            <input type="text" required name="Mobile Number"/>
        </p>

        <button type="submit">submit</button>
        <p>Already have an account? <a href="sign_in.html">Sign in</a></p>
    </form>
    
</body>
</html>
