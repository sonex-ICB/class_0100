<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: aliceblue;
            margin: 0px;
            padding: 0px;   
            height: 100vh;
            justify-content: center;
            align-items: center;
            display: flex;
            background-image: url(shap.png);
        }
        form{
            display: flex;
            flex-direction: column;
            background: #00398f;
            border-radius: 15px;
            padding: 12px;
            width: fit-content;
        }
        form:hover{
            border-radius: 2px;
            transition: .3s;
            box-shadow: 5px 5px 7px 0px #ffffff45;
            transform: translate(0, -3px);
        }
        input{
            padding: 3px;
            border-radius: 4px;
            margin-top: 5px;
            border: 0;
        }
        input:hover{
            box-shadow: 0 0 5px;
        }
        .form-group input{
            border: 0px;
            width: 99%;
            outline:0px
        }
        .form-group button{
            border: 0px;
            display: flex;
            background: transparent;
            margin-top: -19px;
            margin-left: 400px;
        }
        p a{
            text-decoration: none;
            color: aliceblue;
        }
        .links a{
            text-decoration: none;
            color: rgb(0, 0, 0);
            background-color: aliceblue;
            border-radius: 8px;
            padding: 8px 10px;
            margin-left: 100px;
        }
        .links:hover{
            box-shadow: 5px 5px 7px 0px #ffffff00;
            transform: translate(0, -1px);
        }
        .pass a:hover{
            text-decoration: underline;
        }
        button:hover{
            box-shadow: 5px 5px 7px 0px #ffffff45;
            transform: translate(0, -1px);
        }
        .link{
            padding: 8px;
            border-radius: 4px;
            border: 0px;
            margin: 10px;
        }
        .sub{
            padding: 8px;
            border-radius: 4px;
            border: 0px;
            margin: 7px;
            width: 50%;
            margin-left: 10px;
        }
        .line{
            display: flex;
            gap: 20px;
            align-items: center;
        }
        hr{
            flex: 1;
        }
        .acc{
            margin-left: 130px;
        }
        .acc a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
     <form action="" method="POST">
        <h1> Welcome to Suplex City🏢 </h1>
        <label for=""> Email or Username</label>
        <input type="text" required name="username" />
        <b> <a href="ps"></a></b>

        <label for=""> Password</label>
        <div class="form-group">
            <input type="password" required name="password" />
            <button> Show </button>
        </div>

        <p class="pass"> <a href="forgot-password.html"> Forgot Password </a> </p>
        
        <button class="link" type="submit">  🔗 Send Link</button>
        <button class="sub" type="submit"> Submit   </button>
        <div class="line">
            <hr>
            <span> login with</span>
            <hr>
        </div>
        <div class="links">
            <a href="">Google</a>
            <a href="https://secure.facebook.com/login/">Facebook</a>
        </div>
        <p class="acc"> Dont have an account  <a href="signup.html"> Sign Up </a></p>
    </form>
</body>
</body>
</html>
