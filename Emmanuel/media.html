<!-- An image is a picture displayed on a web page. 
 The <img> tag is used to insert images into HTML. -->
 
 <img src="image.jpg" alt="Addidas" width="300">

 <!-- The audio element is used to add sound or music to
web page. It uses the <audio> tag. -->
    <audio controls>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- The video element is used to display videos on a web page.
It uses the <video> tag. -->
    <video width="300" height="200" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

<!-- An iframe (Inline Frame) is used to embed another web page
or online content, such as a map or YouTube video, inside the 
current web page. -->
<iframe
    src="https://www.example.com"
    width="600"
    height="400">
</iframe>
