<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            background: #009c7d;
            padding: 20px;
            width: 70px;
            border-radius: 8px;
            transform: translate(-100px);
            transition: .4s;
        }
        p:hover{
            transform: rotate(50deg);
            box-shadow: 0 0 2px 1px;
        }
    </style>
</head>
<body>
    <div class="box">
        <p>Home</p>
        <p>About</p>
        <p>Services</p>
        <p>Donations</p>
    </div>
</body>
</html>
