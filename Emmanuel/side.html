<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        body{
            background: yellow;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;

        }
        .order{
            background: rgb(255, 255, 255);
            align-items: center;
            margin-top: 120px;
            margin-left: 430px;
            box-shadow: 0 0 7px 2px;
            padding: 20px;
            width: 480px;
            border-radius: 5px;
        }
        .toyota{
            display: block;
            background: rgb(237, 238, 240);
            padding: 10px;
            width: 420px;
            border-radius: 8px;
            margin-left: 10px;
            box-shadow: 0 0 2px 1px rgba(0, 0, 0, 0.388);
        }
        .order p{
            margin-top: -10px;
            margin-left: 150px;
        }
        button{
            background: #000;
            color: white;
            padding: 2px;
            border-radius: 8px;
            width: 210px;
            margin-top: 20px;
            margin-left: 100px;
        }
        img{
            margin-left: 130px;
            padding:10px;
            background: transparent;
        }
        img:hover{
            transform: rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="order">
        <img src="shoe.png" alt="" width="150px">
        <p>⭐⭐⭐⭐⭐</p>
        <div class="toyota">
            <div>
                <h6>TOYOTA COROLLA</h6>
                <h6>MODEL: Corolla 2018</h6>
                <h6 style="color: red;">Price: $19,000</h6>
                <h6>Colors: Red, white, Black </h6>
                <h6>Pick Up Location: Wuse Zone 3</h6>
            </div>
        </div>
        <button class="now" type="button"> ORDER NOW </button>
    </div>
</body>
</html>
