<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body{
            background: yellow;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;

        }
        .order{
            box-shadow: 0 0 7px 2px #80808034;
            padding: 20px;
            width: 480px;
            border-radius: 5px;
            width: 90%;
            max-width: 450px;
            margin:60px auto;
        }
       
        .order p{
            margin-top: -10px;
            margin-left: 150px;
        }
        button{
            background: #000;
            color: white;
            padding: 2px;
            border-radius: 8px;
            width: 210px;
            margin-top: 20px;
            margin-left: 100px;
        }
        img{
            margin-left: 130px;
            padding:10px;
            background: transparent;
        }
        img:hover{
            transform: rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="order bg-light ">
        <img src="shoe.png" alt="" width="150px">
        <p class="text-warning">
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
            <i class="ri-star-fill"></i>
        </p>
        <div class="card bg-white shadow-sm border-0 p-3 ">
            <div>
                <h6>TOYOTA COROLLA</h6>
                <h6>MODEL: Corolla 2018</h6>
                <h6 class="text-danger">Price: $19,000</h6>
                <h6>Colors: Red, white, Black </h6>
                <h6>Pick Up Location: Wuse Zone 3</h6>
            </div>
        </div>
        <button class="btn btn-dark  px-5 rounded-5 fw-bold" type="button"> ORDER NOW </button>
    </div>
</body>
</html>
